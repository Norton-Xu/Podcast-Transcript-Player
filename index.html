<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#101113">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Philosophize This">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./app-icon.png">
  <title>Podcast Transcript Player</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090a0b;
      --panel: #101113;
      --panel-raised: #15171a;
      --ink: #f1f0ec;
      --muted: #9d9a92;
      --line: rgba(255, 255, 255, 0.09);
      --accent: #8ccfc1;
      --accent-strong: #d7fff5;
      --accent-soft: rgba(140, 207, 193, 0.14);
      --warn: #e3bd70;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
    }

    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body.drawer-open {
      overflow: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #08110f;
      min-height: 42px;
      padding: 0 14px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--ink);
    }

    button.ghost {
      background: rgba(255, 255, 255, 0.04);
      color: var(--accent-strong);
      border: 1px solid var(--line);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
      color: var(--ink);
      min-height: 42px;
      padding: 9px 11px;
    }

    textarea {
      resize: vertical;
      min-height: 88px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    .app {
      height: 100%;
      background: var(--panel);
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(0, 0, 0, 0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
    }

    body.drawer-open .drawer-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    .sidebar {
      background: rgba(20, 21, 24, 0.96);
      box-shadow: 18px 0 54px rgba(0, 0, 0, 0.4);
      min-width: 0;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 30;
      display: flex;
      flex-direction: column;
      width: min(390px, 88vw);
      max-height: 100dvh;
      overflow: hidden;
      border: 0;
      border-radius: 0;
      transform: translateX(-100%);
      backdrop-filter: blur(26px) saturate(145%);
      transition: transform 280ms cubic-bezier(0.32, 0.72, 0, 1);
    }

    body.drawer-open .sidebar {
      transform: translateX(0);
    }

    .drawer-nav {
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: max(10px, env(safe-area-inset-top)) 12px 8px 20px;
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.25;
      font-weight: 720;
    }

    .brand-text {
      min-width: 0;
    }

    .settings {
      display: grid;
      gap: 8px;
      padding: 6px 16px 12px;
      border-bottom: 0;
    }

    .settings details {
      overflow: hidden;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.075);
    }

    .settings summary {
      cursor: pointer;
      color: rgba(255, 255, 255, 0.94);
      font-weight: 720;
      min-height: 44px;
      padding: 0 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      list-style: none;
    }

    .settings summary::-webkit-details-marker {
      display: none;
    }

    .settings summary .symbol {
      width: 18px;
      height: 18px;
      color: rgba(255, 255, 255, 0.52);
      transition: transform 160ms ease;
    }

    .settings details[open] summary {
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.075);
    }

    .settings details[open] summary .symbol {
      transform: rotate(180deg);
    }

    .settings details > *:not(summary) {
      margin-left: 12px;
      margin-right: 12px;
    }

    .settings details > *:last-child {
      margin-bottom: 12px;
    }

    .settings label {
      min-height: 46px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 86px;
      align-items: center;
      gap: 12px;
      color: rgba(255, 255, 255, 0.78);
      font-weight: 580;
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.065);
    }

    .settings input[type="number"] {
      min-height: 36px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      text-align: right;
      color: rgba(255, 255, 255, 0.92);
      font-variant-numeric: tabular-nums;
      outline: 0;
    }

    .settings input[type="number"]:focus,
    .settings input[type="number"]:focus-visible {
      outline: 0;
      box-shadow: none;
    }

    .quick-actions {
      display: flex;
      justify-content: flex-end;
      padding: 0;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
    }

    .actions {
      display: grid;
      gap: 0;
      margin-top: 2px;
      margin-bottom: 4px;
    }

    .settings .actions button {
      min-height: 46px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: rgba(255, 255, 255, 0.88);
      text-align: left;
      font-weight: 580;
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.065);
    }

    .settings textarea {
      min-height: 112px;
      border: 0;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.065);
      outline: 0;
    }

    .settings textarea:focus,
    .settings textarea:focus-visible {
      outline: 0;
      box-shadow: none;
    }

    .settings #useManual {
      border: 0;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.94);
    }

    .status {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .quick-actions button {
      width: 40px;
      min-height: 40px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: rgba(255, 255, 255, 0.86);
      display: grid;
      place-items: center;
    }

    .status.warn {
      color: var(--warn);
    }

    .episode-list {
      overflow: auto;
      margin: 0 16px 16px;
      padding: 0;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.075);
      scrollbar-width: none;
    }

    .episode-list::-webkit-scrollbar {
      display: none;
    }

    .episode {
      position: relative;
      display: grid;
      gap: 3px;
      width: 100%;
      padding: 12px 15px;
      border-radius: 0;
      border: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      background: transparent;
      color: var(--ink);
      text-align: left;
      min-height: 56px;
      font-weight: 590;
      transition: background-color 160ms ease, opacity 120ms ease;
    }

    .episode:last-child {
      border-bottom: 0;
    }

    .episode:active {
      background: rgba(255, 255, 255, 0.07);
      opacity: 0.78;
    }

    .episode.active {
      background: rgba(255, 255, 255, 0.035);
      color: var(--ink);
      box-shadow: none;
    }

    .episode.active::before {
      position: absolute;
      top: 10px;
      bottom: 10px;
      left: 0;
      width: 3px;
      border-radius: 999px;
      background: var(--accent);
      content: "";
    }

    .episode-title {
      line-height: 1.28;
    }

    .episode-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .episode-resume {
      color: var(--accent-strong);
      font-size: 12px;
      font-weight: 650;
      font-variant-numeric: tabular-nums;
    }

    .reader {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
      background:
        radial-gradient(circle at 78% 78%, rgba(102, 42, 64, 0.34), transparent 40%),
        radial-gradient(circle at 18% 8%, rgba(126, 120, 116, 0.18), transparent 38%),
        linear-gradient(180deg, #151516, #0d0d0f 58%, #151113);
    }

    .player {
      display: block;
      padding: 12px clamp(12px, 3vw, 20px);
      border-bottom: 0;
      background: linear-gradient(180deg, rgba(14, 15, 18, 0.74), rgba(14, 15, 18, 0.18));
      backdrop-filter: blur(22px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .player h2 {
      margin: 0;
      min-width: 0;
      min-height: 42px;
      display: flex;
      align-items: center;
      font-size: clamp(17px, 3vw, 21px);
      line-height: 1.2;
      font-weight: 700;
    }

    .player-head {
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr);
      gap: 0;
      align-items: center;
      min-height: 42px;
    }

    #openEpisodes {
      min-height: 40px;
      width: 32px;
      padding: 0;
      border-radius: 999px;
      font-weight: 760;
      position: relative;
    }

    #openEpisodes::after {
      position: absolute;
      inset: 0 -6px;
      content: "";
    }

    #openEpisodes .symbol {
      position: relative;
      z-index: 1;
    }

    .player-meta {
      display: none;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    audio {
      display: none;
    }

    .now-playing {
      display: grid;
      gap: 2px;
      padding: 8px clamp(24px, 6vw, 52px) max(24px, calc(20px + env(safe-area-inset-bottom)));
      border-top: 0;
      background: linear-gradient(180deg, rgba(16, 16, 18, 0), rgba(11, 10, 12, 0.58) 22%, rgba(11, 10, 12, 0.72));
      box-shadow: none;
      backdrop-filter: blur(26px);
      z-index: 9;
    }

    .transport {
      display: flex;
      justify-content: center;
      gap: clamp(34px, 11vw, 72px);
      align-items: center;
    }

    .play-button {
      width: 84px;
      min-height: 84px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.96);
      background: transparent;
      box-shadow: none;
      display: grid;
      place-items: center;
    }

    .skip-button {
      width: 64px;
      min-height: 64px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.92);
      background: transparent;
      display: grid;
      place-items: center;
      font-size: 0;
      box-shadow: none;
    }

    .play-button:active {
      transform: scale(0.96);
      opacity: 0.78;
    }

    .skip-button:active {
      transform: scale(0.94);
      background: transparent;
      opacity: 0.78;
    }

    .play-icon {
      width: 46px;
      height: 46px;
      fill: currentColor;
      overflow: visible;
    }

    .play-icon .pause-glyph {
      display: none;
    }

    .play-button.is-playing .play-glyph {
      display: none;
    }

    .play-button.is-playing .pause-glyph {
      display: block;
    }

    .seek-icon {
      position: relative;
      display: block;
      width: 40px;
      height: 40px;
    }

    .seek-icon svg {
      display: block;
      width: 40px;
      height: 40px;
      fill: currentColor;
      overflow: visible;
    }

    .seek-count {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: currentColor;
      font-size: 10px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0;
      transform: translateY(0.5px);
    }

    .progress-area {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .progress {
      --progress: 0%;
      width: 100%;
      height: 34px;
      margin: 0;
      min-height: 0;
      padding: 0;
      border: 0;
      outline: 0;
      appearance: none;
      accent-color: #f1f0ec;
      background: transparent;
      cursor: pointer;
    }

    .progress:focus,
    .progress:focus-visible {
      outline: 0;
      box-shadow: none;
    }

    .progress::-webkit-slider-runnable-track {
      height: 5px;
      border-radius: 999px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.78) 0 var(--progress), rgba(255, 255, 255, 0.22) var(--progress) 100%);
    }

    .progress::-webkit-slider-thumb {
      appearance: none;
      width: 15px;
      height: 15px;
      margin-top: -5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: none;
    }

    .progress::-moz-range-track {
      height: 5px;
      border-radius: 999px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.78) 0 var(--progress), rgba(255, 255, 255, 0.22) var(--progress) 100%);
    }

    .progress::-moz-range-thumb {
      width: 15px;
      height: 15px;
      border: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: none;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .search-row {
      display: flex;
      gap: 4px;
      align-items: center;
      margin-top: 6px;
      min-width: 0;
    }

    .icon-action {
      width: 44px;
      flex: 0 0 44px;
      min-height: 44px;
      padding: 0;
      border-radius: 50%;
      border: 0;
      background: transparent;
      color: rgba(255, 255, 255, 0.84);
      display: grid;
      place-items: center;
      transition: transform 120ms ease, opacity 120ms ease, background-color 160ms ease;
    }

    .icon-action:active,
    .quick-actions button:active {
      transform: scale(0.94);
      opacity: 0.72;
    }

    .icon-action.is-pressed,
    .quick-actions button.is-pressed {
      transform: scale(0.94);
      opacity: 0.72;
    }

    .play-button.is-pressed {
      transform: scale(0.96);
      opacity: 0.78;
    }

    .skip-button.is-pressed {
      transform: scale(0.94);
      opacity: 0.78;
    }

    .episode.is-pressed {
      background: rgba(255, 255, 255, 0.07);
      opacity: 0.78;
    }

    button.icon-action {
      border: 0;
      background: transparent;
      color: rgba(255, 255, 255, 0.84);
    }

    .icon-action.active {
      background: rgba(255, 255, 255, 0.085);
      color: rgba(255, 255, 255, 0.96);
    }

    button.icon-action.active {
      background: rgba(255, 255, 255, 0.085);
      color: rgba(255, 255, 255, 0.96);
    }

    .search-shell {
      flex: 1 1 auto;
      width: 100%;
      min-width: 0;
      min-height: 44px;
      border: 0;
      border-radius: 0;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: transparent;
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.07);
    }

    .search-shell:focus-within {
      background: transparent;
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.16);
    }

    .search-shell .icon-action {
      flex: 0 0 44px;
      border-color: transparent;
      background: transparent;
    }

    .search-shell input {
      width: 100%;
      min-width: 0;
      min-height: 44px;
      padding: 0 14px 0 2px;
      border: 0;
      outline: 0;
      opacity: 1;
      background: transparent;
      color: rgba(255, 255, 255, 0.92);
      transition: opacity 160ms ease;
    }

    .search-shell input::placeholder {
      color: rgba(255, 255, 255, 0.38);
    }

    .search-shell input:focus,
    .search-shell input:focus-visible {
      outline: 0;
      box-shadow: none;
    }

    .search-shell input::-webkit-search-decoration,
    .search-shell input::-webkit-search-cancel-button,
    .search-shell input::-webkit-search-results-button,
    .search-shell input::-webkit-search-results-decoration {
      appearance: none;
      display: none;
    }

    .search-close {
      flex: 0 0 44px;
      width: 44px;
      min-height: 44px;
      padding: 0;
      border: 0;
      background: transparent;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.84);
      transition: transform 140ms ease, opacity 140ms ease;
    }

    button.search-close {
      border: 0;
      background: transparent;
    }

    .search-shell.show-clear .search-close {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .symbol {
      display: block;
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .quick-actions .symbol {
      width: 21px;
      height: 21px;
      stroke-width: 2.1;
    }

    .transcript {
      overflow: auto;
      padding: 22px clamp(12px, 4vw, 54px) 42px;
      scroll-behavior: smooth;
      scrollbar-width: none;
      -ms-overflow-style: none;
      -webkit-mask-image: linear-gradient(to bottom, #000 0, #000 calc(100% - 96px), transparent 100%);
      mask-image: linear-gradient(to bottom, #000 0, #000 calc(100% - 96px), transparent 100%);
    }

    .transcript::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    .empty {
      max-width: 680px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 16px;
    }

    .paragraph {
      max-width: 820px;
      margin: 0 auto 18px;
      padding: 12px 16px;
      border-radius: 14px;
      line-height: 1.72;
      font-size: clamp(17px, 4.35vw, 19px);
      color: rgba(241, 240, 236, 0.62);
      transition: background 120ms ease, color 120ms ease;
    }

    .paragraph.current {
      background: rgba(255, 255, 255, 0.11);
      color: rgba(255, 255, 255, 0.98);
      box-shadow: none;
    }

    mark.search-match {
      padding: 0 1px;
      border-radius: 4px;
      background: rgba(244, 201, 111, 0.88);
      color: #17130e;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }

    .manual {
      display: none;
      gap: 10px;
      padding-top: 4px;
    }

    .manual.open {
      display: grid;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    @media (max-width: 850px) {
      body {
        background: var(--panel);
      }

      .app {
        padding: 0;
        gap: 0;
      }

      .reader {
        border-radius: 0;
        border-left: 0;
        border-right: 0;
        box-shadow: none;
      }

      .row {
        grid-template-columns: 1fr;
      }

      .player-meta {
        font-size: 12px;
        gap: 7px;
      }

      .player {
        padding: 10px 12px;
      }

      .transport {
        gap: 20px;
      }

      .play-button {
        width: 76px;
        min-height: 76px;
      }

      .skip-button {
        width: 58px;
        min-height: 58px;
      }

      .icon-action {
        width: 44px;
        min-height: 44px;
      }

      .search-shell .icon-action {
        flex-basis: 44px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div id="drawerBackdrop" class="drawer-backdrop" aria-hidden="true"></div>
    <aside class="sidebar" aria-label="Podcast episodes">
      <header class="drawer-nav">
        <section class="brand">
          <div class="brand-text">
            <h1>Philosophize This!</h1>
          </div>
        </section>

        <section class="quick-actions">
          <div id="status" class="status" aria-live="polite">Loading episodes...</div>
          <button id="loadFeed" class="secondary" type="button" aria-label="Refresh episodes" title="Refresh episodes">
            <svg class="symbol" viewBox="0 0 256 256" aria-hidden="true"><path d="M240,56v48a8,8,0,0,1-8,8H184a8,8,0,0,1,0-16H211.4L184.81,71.64l-.25-.24a80,80,0,1,0-1.67,114.78,8,8,0,0,1,11,11.63A95.44,95.44,0,0,1,128,224h-1.32A96,96,0,1,1,195.75,60L224,85.8V56a8,8,0,1,1,16,0Z"></path></svg>
          </button>
        </section>
      </header>

      <section class="settings">
        <details>
          <summary>Options <svg class="symbol" viewBox="0 0 256 256" aria-hidden="true"><path d="M213.66,101.66l-80,80a8,8,0,0,1-11.32,0l-80-80A8,8,0,0,1,53.66,90.34L128,164.69l74.34-74.35a8,8,0,0,1,11.32,11.32Z"></path></svg></summary>
          <div class="row">
            <label>
              Intro offset, sec
              <input id="introOffset" type="number" min="0" step="1" value="0">
            </label>
            <label>
              Outro offset, sec

        </details>

    </aside>

    <section class="reader" aria-label="Player and transcript">
      <section class="player">

              <path class="pause-glyph" d="M216,48V208a16,16,0,0,1-16,16H160a16,16,0,0,1-16-16V48a16,16,0,0,1,16-16h40A16,16,0,0,1,216,48ZM96,32H56A16,16,0,0,0,40,48V208a16,16,0,0,0,16,16H96a16,16,0,0,0,16-16V48A16,16,0,0,0,96,32Z"></path>

  <script>
    const STORAGE_KEY = "podcast-transcript-player-v1";
    const PODCAST_RSS_URL = "https://feeds.megaphone.fm/QCD6036500916";
    const TRANSCRIPTS_INDEX_URL = "https://www.philosophizethis.org/transcripts";
    const TRANSCRIPT_FALLBACK_PATTERN = "https://www.philosophizethis.org/transcript/episode-{episode}-transcript";
    const FEED_CACHE_MAX_AGE_MS = 12 * 60 * 60 * 1000;
    const TRANSCRIPT_INDEX_CACHE_MAX_AGE_MS = 24 * 60 * 60 * 1000;

    const els = {
      drawerBackdrop: document.getElementById("drawerBackdrop"),
      openEpisodes: document.getElementById("openEpisodes"),
      introOffset: document.getElementById("introOffset"),
      outroOffset: document.getElementById("outroOffset"),
      loadFeed: document.getElementById("loadFeed"),
      toggleManual: document.getElementById("toggleManual"),
      clearSync: document.getElementById("clearSync"),
      manualBox: document.getElementById("manualBox"),
      manualTranscript: document.getElementById("manualTranscript"),
      useManual: document.getElementById("useManual"),
      status: document.getElementById("status"),
      episodeList: document.getElementById("episodeList"),
      episodeTitle: document.getElementById("episodeTitle"),
      episodeDate: document.getElementById("episodeDate"),
      episodeNumber: document.getElementById("episodeNumber"),
      sourceLink: document.getElementById("sourceLink"),
      transcriptLink: document.getElementById("transcriptLink"),
      audio: document.getElementById("audio"),
      back15: document.getElementById("back15"),
      playPause: document.getElementById("playPause"),
      forward15: document.getElementById("forward15"),
      progress: document.getElementById("progress"),
      currentTime: document.getElementById("currentTime"),
      remainingTime: document.getElementById("remainingTime"),
      transcript: document.getElementById("transcript"),
      openSearch: document.getElementById("openSearch"),
      closeSearch: document.getElementById("closeSearch"),
      searchShell: document.getElementById("searchShell"),
      search: document.getElementById("search"),
      follow: document.getElementById("follow"),
    };

    let state = loadState();
    let episodes = [];
    let transcriptMap = {};
    let transcriptIndexLoaded = false;
    let selectedEpisode = null;
    let paragraphs = [];
    let paragraphTimeline = [];
    let currentParagraphIndex = -1;
    let lastSavedAt = 0;
    let drawerTouchStart = null;

    hydrateSettings();
    bindEvents();
    bindPressFeedback();
    setupMediaSession();
    hydrateCachedSelection();
    hydrateCachedFeed();
    loadFeed();
    registerServiceWorker();

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveState(patch = {}) {
      state = { ...state, ...patch };
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (error) {
        console.warn("Could not save local cache.", error);
      }
    }

    function registerServiceWorker() {
      if (!("serviceWorker" in navigator) || !window.isSecureContext) return;
      navigator.serviceWorker.register("./sw.js", { scope: "./" }).catch((error) => {
        console.warn("Offline support could not be enabled.", error);
      });
    }

    function freshCache(entry, maxAgeMs) {
      if (!entry || !Number.isFinite(entry.savedAt)) return null;
      return Date.now() - entry.savedAt <= maxAgeMs ? entry : null;
    }

    function hydrateSettings() {
      els.introOffset.value = String(state.introOffset ?? 0);
      els.outroOffset.value = String(state.outroOffset ?? 0);
      setFollowEnabled(state.followAudio ?? true);
    }

    function hydrateCachedSelection() {
      const snapshot = state.selectedEpisodeSnapshot;
      const selectedId = state.selectedEpisodeId;
      const cacheKey = snapshot?.id || selectedId;
      const cachedText = cacheKey ? state.transcriptCache?.[cacheKey] : "";
      if (!cachedText) return;

      selectedEpisode = snapshot || {
        id: selectedId,
        title: "Cached episode",
        displayTitle: "Cached episode",
      };
      currentParagraphIndex = -1;
      els.episodeTitle.textContent = selectedEpisode.displayTitle || selectedEpisode.title;
      els.episodeDate.textContent = formatDate(selectedEpisode.pubDate) || "";
      els.episodeNumber.textContent = selectedEpisode.episodeNumber ? `Episode ${selectedEpisode.episodeNumber}` : "";
      setOptionalLink(els.sourceLink, selectedEpisode.link);
      setOptionalLink(els.transcriptLink, snapshot?.transcriptUrl || "");

      if (snapshot?.audioUrl) {
        els.audio.src = snapshot.audioUrl;
        els.audio.load();
        updatePlayButton();
        updatePlayerProgress();
      }

      updateMediaSessionMetadata();
      renderTranscript(cachedText);
      setStatus("Loaded cached transcript.");
    }

    function hydrateCachedFeed() {
      const xml = state.feedCache?.xml;
      if (!xml) return;

      try {
        episodes = sortEpisodesAscending(parseRss(xml));
        renderEpisodes();
      } catch {
        // A bad local feed cache should never block a fresh network load.
      }
    }

    function bindEvents() {
      els.openEpisodes.addEventListener("click", openEpisodeDrawer);
      els.drawerBackdrop.addEventListener("click", closeEpisodeDrawer);
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeEpisodeDrawer();
      });
      els.episodeList.closest(".sidebar").addEventListener("touchstart", (event) => {
        const touch = event.touches[0];
        drawerTouchStart = touch ? { x: touch.clientX, y: touch.clientY } : null;
      }, { passive: true });
      els.episodeList.closest(".sidebar").addEventListener("touchend", (event) => {
        if (!drawerTouchStart) return;
        const touch = event.changedTouches[0];
        if (!touch) return;
        const dx = touch.clientX - drawerTouchStart.x;
        const dy = touch.clientY - drawerTouchStart.y;
        drawerTouchStart = null;
        if (dx < -70 && Math.abs(dx) > Math.abs(dy) * 1.4) {
          closeEpisodeDrawer();
        }
      }, { passive: true });

      els.loadFeed.addEventListener("click", () => loadFeed({ force: true }));
      els.toggleManual.addEventListener("click", () => {
        els.manualBox.classList.toggle("open");
      });

      els.clearSync.addEventListener("click", () => {
        if (!selectedEpisode) return;
        const syncPoints = { ...(state.syncPoints || {}) };
        delete syncPoints[selectedEpisode.id];
        saveState({ syncPoints });
        currentParagraphIndex = -1;
        updateHighlight();
        setStatus("Cleared sync points for this episode.");
      });

      els.useManual.addEventListener("click", () => {
        if (!selectedEpisode) {
          setStatus("Select an episode first.", true);
          return;
        }
        const text = els.manualTranscript.value.trim();
        if (!text) {
          setStatus("Paste transcript text first.", true);
          return;
        }
        const cacheKey = transcriptCacheKey(selectedEpisode);
        saveState({ transcriptCache: { ...(state.transcriptCache || {}), [cacheKey]: text } });
        renderTranscript(text);
        setStatus("Manual transcript loaded and cached.");
      });

      [els.introOffset, els.outroOffset].forEach((input) => {
        input.addEventListener("change", () => {
          saveState({
            introOffset: numberValue(els.introOffset),
            outroOffset: numberValue(els.outroOffset),
          });
          updateHighlight();
        });
      });

      els.follow.addEventListener("click", () => {
        const enabled = !isFollowEnabled();
        setFollowEnabled(enabled);
        saveState({ followAudio: enabled });
        if (enabled && currentParagraphIndex >= 0) {
          scrollToParagraph(currentParagraphIndex, true);
        }
      });

      els.openSearch.addEventListener("click", () => {
        els.search.focus();
      });

      els.closeSearch.addEventListener("click", clearSearch);
      els.closeSearch.addEventListener("pointerdown", (event) => event.preventDefault());
      els.search.addEventListener("focus", () => updateSearchControls(els.search.value.trim(), true));
      els.search.addEventListener("blur", () => updateSearchControls(els.search.value.trim()));

      els.playPause.addEventListener("click", async () => {
        if (!els.audio.src) return;
        try {
          if (els.audio.paused) {
            await els.audio.play();
          } else {
            els.audio.pause();
          }
        } catch (error) {
          setStatus("Tap again if the browser blocked autoplay.", true);
        }
      });

      els.progress.addEventListener("input", () => {
        if (!Number.isFinite(els.audio.duration) || els.audio.duration <= 0) return;
        els.audio.currentTime = (Number(els.progress.value) / 1000) * els.audio.duration;
        updatePlayerProgress();
        updateHighlight();
      });

      els.back15.addEventListener("click", () => seekBy(-15));
      els.forward15.addEventListener("click", () => seekBy(15));

      els.audio.addEventListener("timeupdate", () => {
        updateHighlight();
        updatePlayerProgress();
        savePlaybackProgress();
      });

      els.audio.addEventListener("loadedmetadata", () => {
        restorePlaybackProgress();
        updatePlayerProgress();
      });
      els.audio.addEventListener("durationchange", updatePlayerProgress);
      els.audio.addEventListener("play", () => {
        updatePlayButton();
        updateMediaSessionPlayback();
      });
      els.audio.addEventListener("pause", () => {
        updatePlayButton();
        updateMediaSessionPlayback();
      });
      els.audio.addEventListener("ended", () => {
        savePlaybackProgress({ completed: true });
        updatePlayButton();
        updateMediaSessionPlayback();
        renderEpisodes();
      });

      els.search.addEventListener("input", () => {
        const query = els.search.value.trim();
        updateSearchControls(query);
        applySearch(query);
      });

    }

    function bindPressFeedback() {
      let pressedButton = null;
      let releaseTimer = null;

      const release = () => {
        if (!pressedButton) return;
        const button = pressedButton;
        pressedButton = null;
        window.clearTimeout(releaseTimer);
        releaseTimer = window.setTimeout(() => button.classList.remove("is-pressed"), 90);
      };

      document.addEventListener("pointerdown", (event) => {
        const button = event.target.closest?.("button");
        if (!button || button.disabled) return;
        window.clearTimeout(releaseTimer);
        pressedButton?.classList.remove("is-pressed");
        pressedButton = button;
        button.classList.add("is-pressed");
      });
      document.addEventListener("pointerup", release);
      document.addEventListener("pointercancel", release);
    }

    function setupMediaSession() {
      if (!("mediaSession" in navigator)) return;

      const handlers = {
        play: () => els.audio.play().catch(() => {}),
        pause: () => els.audio.pause(),
        seekbackward: () => seekBy(-15),
        seekforward: () => seekBy(15),
        seekto: (details) => {
          if (!Number.isFinite(details.seekTime) || !Number.isFinite(els.audio.duration)) return;
          els.audio.currentTime = Math.min(els.audio.duration, Math.max(0, details.seekTime));
          updatePlayerProgress();
          updateHighlight();
        },
      };

      Object.entries(handlers).forEach(([action, handler]) => {
        try {
          navigator.mediaSession.setActionHandler(action, handler);
        } catch {
          // Individual actions vary across iOS browser versions.
        }
      });
    }

    function updateMediaSessionMetadata() {
      if (!("mediaSession" in navigator) || !selectedEpisode || !("MediaMetadata" in window)) return;

      navigator.mediaSession.metadata = new MediaMetadata({
        title: selectedEpisode.displayTitle || selectedEpisode.title,
        artist: "Philosophize This!",
        album: "Transcript Player",
        artwork: [{ src: new URL("./app-icon.png", window.location.href).href, sizes: "512x512", type: "image/png" }],
      });
    }

    function updateMediaSessionPlayback() {
      if (!("mediaSession" in navigator)) return;

      const duration = Number.isFinite(els.audio.duration) && els.audio.duration > 0 ? els.audio.duration : 0;
      const current = Number.isFinite(els.audio.currentTime) ? els.audio.currentTime : 0;
      navigator.mediaSession.playbackState = !els.audio.paused && !els.audio.ended ? "playing" : "paused";

      if (!duration || typeof navigator.mediaSession.setPositionState !== "function") return;
      try {
        navigator.mediaSession.setPositionState({
          duration,
          position: Math.min(duration, Math.max(0, current)),
          playbackRate: els.audio.playbackRate || 1,
        });
      } catch {
        // Position reporting is optional and can reject an incomplete duration.
      }
    }

    async function loadFeed({ force = false } = {}) {
      saveState({
        introOffset: numberValue(els.introOffset),
        outroOffset: numberValue(els.outroOffset),
      });

      setStatus(force ? "Refreshing episodes..." : "Loading episodes...");
      els.loadFeed.disabled = true;

      try {
        const transcriptIndexPromise = loadTranscriptIndex({ force });
        const cachedFeed = !force && freshCache(state.feedCache, FEED_CACHE_MAX_AGE_MS);
        let xml = cachedFeed?.xml || "";
        if (!xml) {
          xml = await fetchText(PODCAST_RSS_URL, "RSS");
          saveState({ feedCache: { xml, savedAt: Date.now() } });
        }

        episodes = sortEpisodesAscending(parseRss(xml));
        renderEpisodes();
        setStatus(cachedFeed ? `Loaded ${episodes.length} cached episodes.` : `Loaded ${episodes.length} episodes.`);

        const savedId = state.selectedEpisodeId;
        const savedEpisode = episodes.find((episode) => episode.id === savedId);
        if (savedEpisode && selectedEpisode?.id !== savedEpisode.id) {
          selectEpisode(savedEpisode);
        } else if (!selectedEpisode && episodes[0]) {
          // On a true first visit, start useful work as soon as RSS arrives.
          selectEpisode(episodes[0]);
        }

        await transcriptIndexPromise;
        renderEpisodes();
      } catch (error) {
        setStatus(`${error.message}. If this is a CORS error, this static version needs a tiny proxy later.`, true);
      } finally {
        els.loadFeed.disabled = false;
      }
    }

    function openEpisodeDrawer() {
      savePlaybackProgress();
      renderEpisodes();
      document.body.classList.add("drawer-open");
    }

    function closeEpisodeDrawer() {
      document.body.classList.remove("drawer-open");
    }

    function sortEpisodesAscending(items) {
      return [...items].sort((left, right) => {
        const leftNumber = Number(left.episodeNumber);
        const rightNumber = Number(right.episodeNumber);
        if (Number.isFinite(leftNumber) && Number.isFinite(rightNumber) && leftNumber !== rightNumber) {
          return leftNumber - rightNumber;
        }
        return new Date(left.pubDate).getTime() - new Date(right.pubDate).getTime();
      });
    }

    async function loadTranscriptIndex({ force = false } = {}) {
      const cachedIndex = !force && freshCache(state.transcriptIndexCache, TRANSCRIPT_INDEX_CACHE_MAX_AGE_MS);
      if (cachedIndex?.map && typeof cachedIndex.map === "object") {
        transcriptMap = cachedIndex.map;
        transcriptIndexLoaded = true;
        return;
      }

      try {
        const html = await fetchText(TRANSCRIPTS_INDEX_URL, "transcript index");
        transcriptMap = parseTranscriptIndex(html);
        transcriptIndexLoaded = true;
        saveState({ transcriptIndexCache: { map: transcriptMap, savedAt: Date.now() } });
      } catch {
        transcriptMap = {};
        transcriptIndexLoaded = false;
      }
    }

    function parseTranscriptIndex(html) {
      if (looksLikeReaderText(html)) {
        return parseReaderTranscriptIndex(html);
      }

      const doc = new DOMParser().parseFromString(html, "text/html");
      const map = {};
      Array.from(doc.querySelectorAll("a[href]")).forEach((link) => {
        const label = normalizeText(link.textContent);
        const episodeNumber = extractEpisodeNumber(label);
        if (!episodeNumber || !/transcript/i.test(label)) return;
        const href = new URL(link.getAttribute("href"), TRANSCRIPTS_INDEX_URL).href;
        map[episodeNumber] = href;
      });
      return map;
    }

    function parseReaderTranscriptIndex(text) {
      const map = {};
      const linkPattern = /\[([^\]]*Episode\s*#?\s*(\d{1,4})\s*-\s*Transcript[^\]]*)\]\((https?:\/\/[^)]+)\)/gi;
      let match;
      while ((match = linkPattern.exec(text)) !== null) {
        map[match[2]] = match[3];
      }
      return map;
    }

    function parseRss(xml) {
      const doc = new DOMParser().parseFromString(xml, "application/xml");
      const parserError = doc.querySelector("parsererror");
      if (parserError) throw new Error("Could not parse RSS XML");

      return Array.from(doc.querySelectorAll("item")).map((item, index) => {
        const title = textOf(item, "title") || `Episode ${index + 1}`;
        const guid = textOf(item, "guid");
        const link = textOf(item, "link");
        const enclosure = item.querySelector("enclosure[url]");
        const audioUrl = enclosure?.getAttribute("url") || findAudioUrl(item);
        const pubDate = textOf(item, "pubDate");
        const episodeNumber = extractEpisodeNumber(title) || extractEpisodeNumber(link) || extractEpisodeNumber(guid);
        const displayTitle = formatEpisodeTitle(title, episodeNumber);
        const id = guid || link || audioUrl || `${title}-${index}`;
        return {
          id,
          title,
          displayTitle,
          link,
          audioUrl,
          pubDate,
          episodeNumber,
          index,
        };
      }).filter((episode) => episode.audioUrl);
    }

    function textOf(root, selector) {
      return root.querySelector(selector)?.textContent?.trim() || "";
    }

    function findAudioUrl(item) {
      const text = item.textContent || "";
      return text.match(/https?:\/\/[^\s<>"']+\.(mp3|m4a|aac)(\?[^\s<>"']*)?/i)?.[0] || "";
    }

    function extractEpisodeNumber(value = "") {
      const patterns = [
        /\b(?:episode|ep\.?)\s*#?\s*(\d{1,4})\b/i,
        /\b#\s*(\d{1,4})\b/,
        /\b(\d{1,4})\b/,
      ];
      for (const pattern of patterns) {
        const match = String(value).match(pattern);
        if (match) return match[1];
      }
      return "";
    }

    function formatEpisodeTitle(title, episodeNumber) {
      let cleaned = normalizeText(title)
        .replace(/\u2026/g, " ")
        .replace(/\.{2,}/g, " ")
        .replace(/\s+[-:]\s*$/g, "")
        .trim();

      if (episodeNumber) {
        const prefix = new RegExp(`^episode\\s*#?\\s*${episodeNumber}\\s*[-:.]*\\s*`, "i");
        cleaned = cleaned.replace(prefix, "").trim();
      }

      cleaned = cleaned.replace(/^\s*[-:]\s*/, "").replace(/\s+/g, " ").trim();
      return episodeNumber && cleaned ? `${episodeNumber} - ${cleaned}` : cleaned || title;
    }

    function renderEpisodes() {
      els.episodeList.innerHTML = "";
      if (!episodes.length) {
        els.episodeList.innerHTML = `<div class="empty">No playable audio episodes were found in this RSS feed.</div>`;
        return;
      }

      const fragment = document.createDocumentFragment();
      episodes.forEach((episode) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "episode";
        button.classList.toggle("active", episode.id === (selectedEpisode?.id || state.selectedEpisodeId));
        button.dataset.id = episode.id;
        button.innerHTML = `
          <span class="episode-title"></span>
          <span class="episode-meta"></span>
          <span class="episode-resume" hidden></span>
        `;
        button.querySelector(".episode-title").textContent = episode.displayTitle || episode.title;
        button.querySelector(".episode-meta").textContent = [
          episode.episodeNumber ? `Episode ${episode.episodeNumber}` : "",
          formatDate(episode.pubDate),
          hasKnownTranscript(episode) ? "Transcript" : "Audio only",
        ].filter(Boolean).join(" · ") || "Audio available";
        const resume = button.querySelector(".episode-resume");
        const listeningProgress = getListeningProgress(episode.id);
        if (listeningProgress) {
          resume.hidden = false;
          resume.textContent = listeningProgress.completed
            ? "Finished"
            : `Resume ${formatTime(listeningProgress.time)}`;
        }
        button.addEventListener("click", () => selectEpisode(episode));
        fragment.appendChild(button);
      });
      els.episodeList.appendChild(fragment);
    }

    async function selectEpisode(episode) {
      selectedEpisode = episode;
      currentParagraphIndex = -1;
      const transcriptUrl = buildTranscriptUrl(episode);
      saveState({
        selectedEpisodeId: episode.id,
        selectedEpisodeSnapshot: episodeSnapshot(episode, transcriptUrl),
      });

      document.querySelectorAll(".episode").forEach((button) => {
        button.classList.toggle("active", button.dataset.id === episode.id);
      });

      els.episodeTitle.textContent = episode.displayTitle || episode.title;
      els.episodeDate.textContent = formatDate(episode.pubDate) || "No date";
      els.episodeNumber.textContent = episode.episodeNumber ? `Episode ${episode.episodeNumber}` : "No episode number found";
      setOptionalLink(els.sourceLink, episode.link);
      els.audio.src = episode.audioUrl;
      els.audio.load();
      updatePlayButton();
      updatePlayerProgress();
      updateMediaSessionMetadata();
      clearSearch();
      closeEpisodeDrawer();

      setOptionalLink(els.transcriptLink, transcriptUrl);

      const cacheKey = transcriptCacheKey(episode);
      const cachedText = state.transcriptCache?.[cacheKey];
      if (cachedText) {
        renderTranscript(cachedText);
        setStatus("Loaded cached transcript.");
        return;
      }

      renderEmpty("Loading transcript...");

      if (!transcriptUrl) {
        renderEmpty("No transcript page matched this episode. Paste transcript text from Options.");
        setStatus("No transcript page matched this episode.", true);
        return;
      }

      try {
        setStatus("Loading transcript...");
        const html = await fetchText(transcriptUrl, "transcript");
        const text = extractReadableText(html);
        if (!text) throw new Error("No readable transcript text found");
        saveState({ transcriptCache: { ...(state.transcriptCache || {}), [cacheKey]: text } });
        renderTranscript(text);
        setStatus("Transcript loaded and cached.");
      } catch (error) {
        renderEmpty("Could not load transcript automatically. You can paste it manually from Options.");
        setStatus(`${error.message}. Browser CORS may be blocking the transcript page.`, true);
      }
    }

    function buildTranscriptUrl(episode) {
      if (!episode.episodeNumber) return "";
      if (transcriptMap[episode.episodeNumber]) return transcriptMap[episode.episodeNumber];
      if (transcriptIndexLoaded) return "";
      return TRANSCRIPT_FALLBACK_PATTERN.replaceAll("{episode}", episode.episodeNumber);
    }

    function hasKnownTranscript(episode) {
      return Boolean(episode.episodeNumber && transcriptMap[episode.episodeNumber]);
    }

    async function fetchText(url, label) {
      const urls = [
        url,
        `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        `https://r.jina.ai/http://${url}`,
      ];

      let lastError = null;
      for (const requestUrl of urls) {
        try {
          const response = await fetch(requestUrl);
          if (!response.ok) throw new Error(`${label} request failed: ${response.status}`);
          return await response.text();
        } catch (error) {
          lastError = error;
        }
      }

      throw lastError || new Error(`${label} request failed`);
    }

    function setOptionalLink(element, href) {
      if (!href) {
        element.hidden = true;
        element.removeAttribute("href");
        return;
      }
      element.hidden = false;
      element.href = href;
    }

    function transcriptCacheKey(episode) {
      return episode.id || episode.title;
    }

    function episodeSnapshot(episode, transcriptUrl = "") {
      return {
        id: episode.id,
        title: episode.title,
        displayTitle: episode.displayTitle,
        link: episode.link,
        audioUrl: episode.audioUrl,
        pubDate: episode.pubDate,
        episodeNumber: episode.episodeNumber,
        transcriptUrl,
      };
    }

    function extractReadableText(html) {
      if (looksLikeReaderText(html)) {
        return extractReaderText(html);
      }

      const doc = new DOMParser().parseFromString(html, "text/html");
      doc.querySelectorAll("script, style, noscript, nav, header, footer, iframe, form").forEach((node) => node.remove());
      const root = doc.querySelector("article") || doc.querySelector("main") || doc.body;
      const textBlocks = Array.from(root.querySelectorAll("p, li, blockquote"))
        .map((node) => normalizeText(node.textContent))
        .filter((text) => text.length > 25);

      const unique = [];
      const seen = new Set();
      textBlocks.forEach((text) => {
        const key = text.slice(0, 120);
        if (!seen.has(key)) {
          seen.add(key);
          unique.push(text);
        }
      });

      return unique.join("\n\n");
    }

    function looksLikeReaderText(text = "") {
      return /^Title:\s/m.test(text) && /\nMarkdown Content:\n/.test(text);
    }

    function extractReaderText(text) {
      const marker = "Markdown Content:";
      const markerIndex = text.indexOf(marker);
      const content = markerIndex >= 0 ? text.slice(markerIndex + marker.length) : text;
      return content
        .split(/\n{2,}/)
        .map((paragraph) => normalizeText(paragraph.replace(/\[([^\]]+)\]\([^)]+\)/g, "$1")))
        .filter((paragraph) => paragraph.length > 25)
        .join("\n\n");
    }

    function renderTranscript(text) {
      paragraphs = text.split(/\n{2,}/)
        .map(normalizeText)
        .filter(Boolean);
      paragraphTimeline = buildParagraphTimeline(paragraphs);

      if (!paragraphs.length) {
        renderEmpty("Transcript is empty.");
        return;
      }

      const fragment = document.createDocumentFragment();
      paragraphs.forEach((paragraph, index) => {
        const p = document.createElement("p");
        p.className = "paragraph";
        p.dataset.index = String(index);
        p.textContent = paragraph;
        fragment.appendChild(p);
      });
      els.transcript.innerHTML = "";
      els.transcript.appendChild(fragment);
      updateHighlight();
    }

    function renderEmpty(message) {
      paragraphs = [];
      paragraphTimeline = [];
      currentParagraphIndex = -1;
      els.transcript.innerHTML = "";
      const div = document.createElement("div");
      div.className = "empty";
      div.textContent = message;
      els.transcript.appendChild(div);
    }

    function updateHighlight() {
      if (!paragraphs.length || !Number.isFinite(els.audio.duration) || els.audio.duration <= 0) return;

      const textProgress = progressForCurrentTime();
      const nextIndex = paragraphIndexForProgress(textProgress);

      if (nextIndex === currentParagraphIndex) return;

      const previous = els.transcript.querySelector(".paragraph.current");
      if (previous) previous.classList.remove("current");

      currentParagraphIndex = nextIndex;
      const current = paragraphElement(nextIndex);
      if (current) current.classList.add("current");

      if (isFollowEnabled()) {
        scrollToParagraph(nextIndex, false);
      }
    }

    function setFollowEnabled(enabled) {
      els.follow.classList.toggle("active", enabled);
      els.follow.setAttribute("aria-pressed", String(enabled));
    }

    function isFollowEnabled() {
      return els.follow.classList.contains("active");
    }

    function buildParagraphTimeline(items) {
      const weights = items.map((paragraph) => Math.max(40, paragraph.length));
      const total = weights.reduce((sum, weight) => sum + weight, 0) || 1;
      let cursor = 0;
      return weights.map((weight) => {
        const start = cursor / total;
        cursor += weight;
        return {
          start,
          end: cursor / total,
          midpoint: (cursor - weight / 2) / total,
        };
      });
    }

    function progressForCurrentTime() {
      const intro = numberValue(els.introOffset);
      const outro = numberValue(els.outroOffset);
      const contentDuration = Math.max(1, els.audio.duration - intro - outro);
      const contentTime = Math.min(contentDuration, Math.max(0, els.audio.currentTime - intro));
      const timeProgress = contentTime / contentDuration;
      const syncPoints = getSyncPoints();

      if (!syncPoints.length) return timeProgress;

      const anchors = [
        { timeProgress: 0, textProgress: 0 },
        ...syncPoints.map((point) => ({
          timeProgress: Math.min(1, Math.max(0, (point.time - intro) / contentDuration)),
          textProgress: paragraphProgress(point.index),
        })),
        { timeProgress: 1, textProgress: 1 },
      ].sort((a, b) => a.timeProgress - b.timeProgress);

      for (let index = 0; index < anchors.length - 1; index += 1) {
        const left = anchors[index];
        const right = anchors[index + 1];
        if (timeProgress >= left.timeProgress && timeProgress <= right.timeProgress) {
          const span = Math.max(0.0001, right.timeProgress - left.timeProgress);
          const local = (timeProgress - left.timeProgress) / span;
          return left.textProgress + local * (right.textProgress - left.textProgress);
        }
      }

      return timeProgress;
    }

    function paragraphIndexForProgress(progress) {
      if (!paragraphTimeline.length) return 0;
      const clamped = Math.min(1, Math.max(0, progress));
      const found = paragraphTimeline.findIndex((entry) => clamped >= entry.start && clamped < entry.end);
      return found >= 0 ? found : paragraphTimeline.length - 1;
    }

    function paragraphProgress(index) {
      const entry = paragraphTimeline[Math.min(paragraphTimeline.length - 1, Math.max(0, index))];
      return entry ? entry.midpoint : 0;
    }

    function syncHere() {
      if (!selectedEpisode || !paragraphs.length || !Number.isFinite(els.audio.currentTime)) return;
      const index = centeredParagraphIndex();
      const nextPoint = { time: els.audio.currentTime, index };
      const syncPoints = [...getSyncPoints(), nextPoint]
        .sort((a, b) => a.time - b.time)
        .filter((point, pointIndex, all) => {
          const next = all[pointIndex + 1];
          return !next || Math.abs(next.time - point.time) > 3;
        });

      saveState({
        syncPoints: {
          ...(state.syncPoints || {}),
          [selectedEpisode.id]: syncPoints,
        },
      });

      currentParagraphIndex = -1;
      updateHighlight();
      setStatus(`Synced this time to paragraph ${index + 1}.`);
    }

    function getSyncPoints() {
      if (!selectedEpisode) return [];
      return Array.isArray(state.syncPoints?.[selectedEpisode.id]) ? state.syncPoints[selectedEpisode.id] : [];
    }

    function centeredParagraphIndex() {
      const centerY = els.transcript.getBoundingClientRect().top + els.transcript.clientHeight / 2;
      let closestIndex = currentParagraphIndex >= 0 ? currentParagraphIndex : 0;
      let closestDistance = Infinity;

      els.transcript.querySelectorAll(".paragraph").forEach((node) => {
        const rect = node.getBoundingClientRect();
        const nodeCenter = rect.top + rect.height / 2;
        const distance = Math.abs(nodeCenter - centerY);
        if (distance < closestDistance) {
          closestDistance = distance;
          closestIndex = Number(node.dataset.index);
        }
      });

      return closestIndex;
    }

    function scrollToParagraph(index, force) {
      const element = paragraphElement(index);
      if (!element) return;
      if (!force && isElementComfortablyVisible(element, els.transcript)) return;
      element.scrollIntoView({ block: "center", behavior: "smooth" });
    }

    function paragraphElement(index) {
      return els.transcript.querySelector(`.paragraph[data-index="${index}"]`);
    }

    function isElementComfortablyVisible(element, container) {
      const elementRect = element.getBoundingClientRect();
      const containerRect = container.getBoundingClientRect();
      const padding = Math.min(180, containerRect.height * 0.25);
      return elementRect.top >= containerRect.top + padding && elementRect.bottom <= containerRect.bottom - padding;
    }

    function getListeningProgress(episodeId) {
      const progress = state.listeningProgress?.[episodeId];
      if (progress && Number.isFinite(progress.time) && progress.time > 0) return progress;

      const legacyTime = state.playback?.[episodeId];
      return Number.isFinite(legacyTime) && legacyTime > 0
        ? { time: legacyTime, completed: false }
        : null;
    }

    function savePlaybackProgress({ completed = false } = {}) {
      if (!selectedEpisode) return;
      const now = Date.now();
      if (!completed && now - lastSavedAt < 1500) return;
      lastSavedAt = now;
      const currentTime = Number.isFinite(els.audio.currentTime) ? els.audio.currentTime : 0;
      saveState({
        playback: {
          ...(state.playback || {}),
          [selectedEpisode.id]: currentTime,
        },
        listeningProgress: {
          ...(state.listeningProgress || {}),
          [selectedEpisode.id]: {
            time: currentTime,
            completed,
            savedAt: now,
          },
        },
      });
    }

    function restorePlaybackProgress() {
      if (!selectedEpisode) return;
      const savedTime = state.playback?.[selectedEpisode.id];
      if (Number.isFinite(savedTime) && savedTime > 0 && savedTime < els.audio.duration - 5) {
        els.audio.currentTime = savedTime;
      }
    }

    function updatePlayButton() {
      const isPlaying = !els.audio.paused && !els.audio.ended;
      els.playPause.classList.toggle("is-playing", isPlaying);
      els.playPause.setAttribute("aria-label", isPlaying ? "Pause" : "Play");
      els.playPause.title = isPlaying ? "Pause" : "Play";
    }

    function seekBy(seconds) {
      if (!Number.isFinite(els.audio.duration) || els.audio.duration <= 0) return;
      els.audio.currentTime = Math.min(els.audio.duration, Math.max(0, els.audio.currentTime + seconds));
      updatePlayerProgress();
      updateHighlight();
    }

    function updatePlayerProgress() {
      const duration = Number.isFinite(els.audio.duration) && els.audio.duration > 0 ? els.audio.duration : 0;
      const current = Number.isFinite(els.audio.currentTime) ? els.audio.currentTime : 0;
      const progress = duration ? Math.round((current / duration) * 1000) : 0;
      els.progress.value = String(progress);
      els.progress.style.setProperty("--progress", `${progress / 10}%`);
      els.currentTime.textContent = formatTime(current);
      els.remainingTime.textContent = duration ? `-${formatTime(Math.max(0, duration - current))}` : "--:--";
      updateMediaSessionPlayback();
    }

    function clearSearch() {
      els.search.value = "";
      updateSearchControls("");
      applySearch("");
    }

    function updateSearchControls(query, isFocused = false) {
      els.searchShell.classList.toggle("show-clear", Boolean(query) || isFocused);
    }

    function formatTime(seconds) {
      const total = Math.max(0, Math.floor(Number(seconds) || 0));
      const minutes = Math.floor(total / 60);
      const remainder = String(total % 60).padStart(2, "0");
      return `${minutes}:${remainder}`;
    }

    function applySearch(query) {
      const needle = query.toLocaleLowerCase();
      let firstHit = null;

      els.transcript.querySelectorAll(".paragraph").forEach((node) => {
        const index = Number(node.dataset.index);
        const text = paragraphs[index] || "";
        const lower = text.toLocaleLowerCase();
        const fragment = document.createDocumentFragment();

        if (!needle) {
          fragment.append(text);
        } else {
          let cursor = 0;
          let matchIndex = lower.indexOf(needle, cursor);
          while (matchIndex !== -1) {
            fragment.append(text.slice(cursor, matchIndex));
            const mark = document.createElement("mark");
            mark.className = "search-match";
            mark.textContent = text.slice(matchIndex, matchIndex + query.length);
            fragment.appendChild(mark);
            cursor = matchIndex + query.length;
            matchIndex = lower.indexOf(needle, cursor);
          }
          fragment.append(text.slice(cursor));
          if (cursor > 0 && !firstHit) firstHit = node;
        }

        node.replaceChildren(fragment);
      });

      if (firstHit) {
        firstHit.scrollIntoView({ block: "center", behavior: "smooth" });
      }
    }

    function setStatus(message, warn = false) {
      els.status.textContent = message;
      els.status.classList.toggle("warn", warn);
    }

    function normalizeText(text = "") {
      return text.replace(/\s+/g, " ").trim();
    }

    function numberValue(input) {
      const value = Number(input.value);
      return Number.isFinite(value) && value >= 0 ? value : 0;
    }

    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    }
  </script>
</body>
</html>
